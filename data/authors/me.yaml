bio: |
  I am a Senior Postdoctoral Research Fellow in Cancer Bioinformatics at [King's College London](https://www.kcl.ac.uk/),
  working in the [Grigoriadis group](https://www.kcl.ac.uk/people/anita-grigoriadis) within the School of Cancer & Pharmaceutical Sciences.
  My research sits at the intersection of spatial transcriptomics, graph theory, explainable AI,
  and tumour microenvironment biology, with a focus on breast and liver cancer.
  I co-lead the [KCL Spatial Biology Facility](https://www.kcl.ac.uk/research/facilities/the-spatial-biology-facility)
  and co-organise the [Alan Turing Interest Group on Topology and Geometry for Data](https://www.turing.ac.uk/research/interest-groups/topology-and-geometry-data).


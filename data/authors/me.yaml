experience:
  - role: Senior Postdoctoral Research Fellow — Cancer Bioinformatics
    org: King's College London
    start: '2024'
    end: ''
    summary: |
      School of Cancer & Pharmaceutical Sciences, Faculty of Life Sciences and Medicine.
      Working on multimodal integration within spatial transcriptomics, explainable AI, and
      higher-order interactions in biological networks. Collaborating with Anita Grigoriadis (KCL)
      and Christopher Banerji (KCL, UCL, Turing Institute).
      Co-lead of the KCL Spatial Biology Facility.
      Co-organiser of the Alan Turing Interest Group on Topology and Geometry for Data.
      Co-creator of Startup Scianno-Mosaics (University of Colorado – Boulder).
  - role: Postdoctoral Research Assistant
    org: Queen Mary University of London & The Alan Turing Institute
    start: '2022'
    end: '2024'
    summary: |
      School of Mathematical Sciences. Project: "Learning from data with structured missingness"
      (Turing–Roche partnership). Collaborating with Ginestra Bianconi (QMUL),
      Ruben Sanchez-Garcia (University of Southampton), and Roche-Genentech.
  - role: PhD Researcher in Biomathematics and Complex Systems
    org: Aix-Marseille University
    start: '2019'
    end: '2022'
    summary: |
      MMG U1251 and TAGC U1090. Developed new formalism of random walk with restart on
      multilayer networks. Created the MultiXrank Python package. Applications in gene-disease
      associations, comorbidities, and 3D DNA conformation networks.

